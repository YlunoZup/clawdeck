name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.3.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: clawdeck-windows-x64.exe
            artifact: clawdeck.exe
          - os: ubuntu-latest
            asset: clawdeck-linux-x64
            artifact: clawdeck
          - os: macos-latest
            asset: clawdeck-macos-x64
            artifact: clawdeck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gir1.2-appindicator3-0.1 libgirepository1.0-dev

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build one-file binary
        run: python scripts/build.py

      - name: Rename binary for upload
        shell: bash
        run: |
          mv "dist/${{ matrix.artifact }}" "dist/${{ matrix.asset }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/${{ matrix.asset }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
